<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — AiCraft</title>
  <link rel="icon" type="image/png" href="/static/logo.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a24; --border: #2a2a3a;
      --accent: #7c3aed; --accent2: #a855f7; --accent3: #06b6d4;
      --text: #f1f1f5; --text2: #9090a8;
    }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 80% 50% at 20% 20%, rgba(124,58,237,0.15) 0%, transparent 60%),
                  radial-gradient(ellipse 60% 40% at 80% 80%, rgba(6,182,212,0.1) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }
    .auth-card {
      position: relative; z-index: 1; width: 100%; max-width: 420px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 28px; padding: 40px 36px; box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; justify-content: center; }
    .logo-icon { width: 40px; height: 40px; border-radius: 10px; overflow: hidden; }
    .logo-icon img { width: 100%; height: 100%; object-fit: cover; }
    .logo-text {
      font-size: 20px; font-weight: 700;
      background: linear-gradient(135deg, var(--accent2), var(--accent3));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; text-align: center; }
    .subtitle { color: var(--text2); font-size: 14px; text-align: center; margin-bottom: 32px; }
    .form-group { margin-bottom: 18px; }
    label {
      display: block; font-size: 12px; font-weight: 600; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;
    }
    input[type="email"], input[type="password"], input[type="text"] {
      width: 100%; padding: 14px 16px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 14px; color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--text2); }
    .remember-row { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
    .remember-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
    .remember-row label { font-size: 13px; color: var(--text2); text-transform: none; letter-spacing: 0; margin: 0; cursor: pointer; }
    .submit-btn {
      width: 100%; padding: 15px; border-radius: 14px; border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white; font-size: 15px; font-weight: 600; cursor: pointer;
      transition: all 0.3s; font-family: 'Inter', sans-serif; position: relative; overflow: hidden;
    }
    .submit-btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--accent2), var(--accent3)); opacity: 0; transition: opacity 0.3s;
    }
    .submit-btn:hover::before { opacity: 1; }
    .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 30px rgba(124,58,237,0.4); }
    .submit-btn span { position: relative; z-index: 1; }
    .error-box {
      padding: 12px 16px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 12px; color: #fca5a5; font-size: 14px; margin-bottom: 20px;
    }
    .divider {
      text-align: center; color: var(--text2); font-size: 13px; margin: 24px 0 20px; position: relative;
    }
    .divider::before, .divider::after {
      content: ''; position: absolute; top: 50%; width: 38%; height: 1px; background: var(--border);
    }
    .divider::before { left: 0; } .divider::after { right: 0; }
    .alt-link {
      display: block; text-align: center; color: var(--accent2); text-decoration: none;
      font-size: 14px; font-weight: 500; padding: 12px; border: 1px solid var(--border);
      border-radius: 14px; transition: all 0.2s;
    }
    .alt-link:hover { border-color: var(--accent); background: rgba(124,58,237,0.08); }
    @media (max-width: 480px) { .auth-card { padding: 28px 20px; } }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="logo">
      <div class="logo-icon"><img src="/static/logo.png" alt="AiCraft"/></div>
      <span class="logo-text">AiCraft</span>
    </div>
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to continue creating</p>
    {% if error %}
    <div class="error-box" role="alert">❌ {{ error }}</div>
    {% endif %}
    <form method="POST" action="/login">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ email }}"
               placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="••••••••" required autocomplete="current-password"/>
      </div>
      <div class="remember-row">
        <input type="checkbox" id="remember" name="remember"/>
        <label for="remember">Remember me</label>
      </div>
      <button type="submit" class="submit-btn"><span>Sign In →</span></button>
    </form>
    <div class="divider">or</div>
    <a href="/register" class="alt-link">Create a free account</a>
  </div>
</body>
</html>
